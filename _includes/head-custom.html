<!-- Copy button on every code block. jekyll-theme-primer doesn't add one,
     so we inject one. Important for non-technical readers who don't know
     to manually select-all + copy long prompts. -->
<style>
  div.highlighter-rouge {
    position: relative;
  }
  div.highlighter-rouge .code-copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    background: #fff;
    color: #57606a;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 10;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  div.highlighter-rouge:hover .code-copy-btn,
  div.highlighter-rouge:focus-within .code-copy-btn {
    opacity: 1;
  }
  div.highlighter-rouge .code-copy-btn:hover {
    background: #f6f8fa;
    color: #24292f;
  }
  div.highlighter-rouge .code-copy-btn.copied {
    background: #dafbe1;
    border-color: #2da44e;
    color: #1a7f37;
  }
  /* Mobile / touch — show button always since hover doesn't apply */
  @media (hover: none) {
    div.highlighter-rouge .code-copy-btn {
      opacity: 1;
    }
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('div.highlighter-rouge').forEach(function (block) {
      if (block.querySelector('.code-copy-btn')) return;

      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.setAttribute('aria-label', 'Copy code to clipboard');

      btn.addEventListener('click', function () {
        var code = block.querySelector('pre, code');
        var text = code ? code.innerText.replace(/\n$/, '') : '';

        var done = function () {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        };

        var fail = function () {
          btn.textContent = 'Copy failed';
          setTimeout(function () {
            btn.textContent = 'Copy';
          }, 2000);
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(fail);
        } else {
          // Fallback for older browsers
          try {
            var range = document.createRange();
            range.selectNodeContents(code);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            document.execCommand('copy');
            sel.removeAllRanges();
            done();
          } catch (e) {
            fail();
          }
        }
      });

      block.appendChild(btn);
    });
  });
</script>
